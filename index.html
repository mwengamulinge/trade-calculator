<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=Montserrat:wght@400;500;600&display=swap');

:root {
  --accent-blue: #3E8BFF;
  --cyan: #44FDFE;
  --soft-white: #FCFDFF;
  --glass-background: rgba(255, 255, 255, 0.85); /* Increased opacity for better visibility */
  --valid-accent: #1D9E75;
  --invalid-accent: #E24B4A;
  --text-primary: #1C2025;
  --text-secondary: #5D6470;
  --muted: #A0A5B0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  background: #0D1117; 
  color: var(--text-primary); 
  font-family: 'Montserrat', sans-serif;
  padding: 20px 10px; /* Removed 100vh centering to prevent "pushing" off screen */
}

.wrap { 
  max-width: 380px; 
  margin: 0 auto;
  padding: 2rem 1.5rem; 
  background: var(--glass-background);
  border-radius: 32px;
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.2);
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
}

.logo-top { font-weight: 600; font-size: 18px; color: var(--text-primary); }
.logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
.bebas-num { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
.session-time { font-size: 24px; color: var(--text-primary); }

/* RESULT CARD */
.result-card {
  border-radius: 18px;
  padding: 1.25rem;
  margin-bottom: 1rem;
  background: #FFF;
  border: 1px solid #E1E6EE;
  transition: all 0.3s ease;
}
.result-card.valid { border: 2px solid var(--valid-accent); background: #F0FFF9; }
.result-card.invalid { border: 2px solid var(--invalid-accent); background: #FFF5F5; }

.empty-state { display: flex; align-items: center; gap: 10px; justify-content: center; opacity: 0.5; }
.empty-line { flex: 1; height: 1px; background: #B0B8C1; }
.empty-text { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-secondary); }

.verdict-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
.verdict-main { font-size: 48px; line-height: 1; margin-bottom: 1rem; }

.metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.metric { background: rgba(0,0,0,0.03); border-radius: 10px; padding: 10px 8px; text-align: center; }
.metric-label { font-size: 7px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
.metric-value { font-size: 16px; }

/* LEVELS CARD */
.levels-card { border-radius: 18px; background: #FFF; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #E1E6EE; }
.level-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0F2F5; }
.level-left { display: flex; align-items: center; gap: 8px; }
.level-dot { width: 6px; height: 6px; border-radius: 50%; }
.level-name { font-size: 10px; color: var(--text-secondary); text-transform: lowercase; }
.level-price { font-size: 15px; }

.rr-row { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 2px dashed #E1E6EE; }
.rr-label { font-size: 9px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); }
.rr-value { font-size: 18px; color: var(--accent-blue); }

/* INPUTS CARD */
.inputs-card { border-radius: 18px; background: #FFF; padding: 1.25rem; border: 1px solid #E1E6EE; }
.input-field { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
.field-label { font-size: 11px; color: var(--text-secondary); }
.field-input { 
  background: #F8FAFC; 
  border: 1px solid #E1E6EE;
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 15px; 
  width: 120px; 
  text-align: right; 
  outline: none; 
}
.field-input:focus { border-color: var(--accent-blue); background: #FFF; }

.valid-text { color: var(--valid-accent); }
.invalid-text { color: var(--invalid-accent); }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div>
      <div class="logo-top">Pattern Scalp</div>
      <div class="logo-sub">Nasdaq / Gold · Validator</div>
    </div>
    <div class="session-time bebas-num">16:15</div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="empty-state" id="emptyState">
      <div class="empty-line"></div>
      <div class="empty-text">waiting for data</div>
      <div class="empty-line"></div>
    </div>
    <div id="resultContent" style="display:none;">
      <div class="verdict-tag" id="verdictTag"></div>
      <div class="verdict-main bebas-num" id="verdictMain"></div>
      <div class="metrics-row">
        <div class="metric">
          <div class="metric-label">Range</div>
          <div class="metric-value bebas-num" id="mRange"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Thresh</div>
          <div class="metric-value bebas-num" id="mThresh"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Diff</div>
          <div class="metric-value bebas-num" id="mExceeded"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="levels-card" id="levelsCard" style="display:none;">
    <div class="level-row">
      <div class="level-left"><div class="level-dot" style="background:var(--invalid-accent)"></div><div class="level-name">stop loss</div></div>
      <div class="level-price bebas-num invalid-text" id="lvlSL"></div>
    </div>
    <div class="level-row">
      <div class="level-left"><div class="level-dot" style="background:#FFD64A"></div><div class="level-name">entry</div></div>
      <div class="level-price bebas-num" id="lvlEntry">TRIGGER</div>
    </div>
    <div class="level-row">
      <div class="level-left"><div class="level-dot" style="background:var(--valid-accent)"></div><div class="level-name">tp 50%</div></div>
      <div class="level-price bebas-num valid-text" id="lvlTP1"></div>
    </div>
    <div class="rr-row">
      <div class="rr-label">R:R RATIO</div>
      <div class="rr-value bebas-num" id="rrVal"></div>
    </div>
  </div>

  <div class="inputs-card">
    <div class="input-field">
      <div class="field-label">High</div>
      <input class="field-input" type="number" id="high" placeholder="0.00" oninput="calc()" />
    </div>
    <div class="input-field">
      <div class="field-label">Low</div>
      <input class="field-input" type="number" id="low" placeholder="0.00" oninput="calc()" />
    </div>
    <div class="input-field">
      <div class="field-label">Daily ATR</div>
      <input class="field-input" type="number" id="atr" placeholder="0.00" oninput="calc()" />
    </div>
  </div>
</div>

<script>
function calc() {
  const high = parseFloat(document.getElementById('high').value);
  const low = parseFloat(document.getElementById('low').value);
  const atr = parseFloat(document.getElementById('atr').value);

  const card = document.getElementById('resultCard');
  const empty = document.getElementById('emptyState');
  const content = document.getElementById('resultContent');
  const levels = document.getElementById('levelsCard');

  if (isNaN(high) || isNaN(low) || isNaN(atr) || high <= low) {
    card.className = 'result-card';
    empty.style.display = 'flex';
    content.style.display = 'none';
    levels.style.display = 'none';
    return;
  }

  const range = high - low;
  const threshold = atr * 0.20;
  const diff = range - threshold;
  const isValid = range >= threshold;

  empty.style.display = 'none';
  content.style.display = 'block';
  levels.style.display = 'block';

  card.className = 'result-card ' + (isValid ? 'valid' : 'invalid');
  
  const tag = document.getElementById('verdictTag');
  const main = document.getElementById('verdictMain');
  
  tag.textContent = isValid ? 'Manipulation Confirmed' : 'Threshold Not Met';
  tag.className = 'verdict-tag ' + (isValid ? 'valid-text' : 'invalid-text');
  
  main.textContent = isValid ? 'VALID SETUP' : 'NO TRADE';
  main.className = 'verdict-main bebas-num ' + (isValid ? 'valid-text' : 'invalid-text');

  document.getElementById('mRange').textContent = range.toFixed(2);
  document.getElementById('mThresh').textContent = threshold.toFixed(2);
  document.getElementById('mExceeded').textContent = (diff >= 0 ? '+' : '') + diff.toFixed(2);
  document.getElementById('mExceeded').className = 'metric-value bebas-num ' + (diff >= 0 ? 'valid-text' : 'invalid-text');

  const slBuffer = range * 0.1;
  document.getElementById('lvlSL').textContent = (high + slBuffer).toFixed(2);
  document.getElementById('lvlTP1').textContent = (low + (range * 0.5)).toFixed(2);
  document.getElementById('rrVal').textContent = (range * 0.5 / (range * 0.1 + range)).toFixed(1) + ' : 1';
}
</script>

</body>
</html>
